<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaptureMemo</title>
  <link rel="stylesheet" href="styles.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-K2ZP2JRGN8"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-K2ZP2JRGN8');
</script>

</head>

<body>

<div class="desktop">

  <!-- DESKTOP ICONS -->
  <div class="desktop-icons">

    <div class="icon" onclick="openApp('overview')">
      <span class="icon-image">📄</span>
      <div class="icon-label" data-i18n="appCaptureMemo"></div>
    </div>

    <div class="icon" onclick="openCalculator()">
      <span class="icon-image">🧮</span>
      <div class="icon-label" data-i18n="calculator"></div>
    </div>

    <div class="icon" onclick="openNotepad()">
      <span class="icon-image">📝</span>
      <div class="icon-label" data-i18n="notepad"></div>
    </div>

    <div class="icon" onclick="openPaint()">
      <span class="icon-image">🎨</span>
      <div class="icon-label" data-i18n="paint"></div>
    </div>

  </div>

  <!-- TASKBAR -->
  <div class="taskbar">
    <div class="start" onclick="toggleStart()">⊞</div>

    <div class="task-title" id="taskTitle"></div>

    <div class="lang" id="langBtn">EN</div>
    <div class="clock" id="clock"></div>
    <div class="calendar" id="calendar"></div>
  </div>

  <!-- START MENU -->
  <div class="start-menu" id="startMenu">
    <div onclick="openApp('overview')" data-i18n="appCaptureMemo"></div>
    <div onclick="openCalculator()" data-i18n="calculator"></div>
    <div onclick="openNotepad()" data-i18n="notepad"></div>
    <div onclick="openPaint()" data-i18n="paint"></div>
  </div>

  <!-- WINDOW -->
  <div class="window" id="appWindow">

    <div class="titlebar" id="dragBar">
      <span>CaptureMemo</span>
      <div class="controls">
        <button onclick="closeWindow()">×</button>
      </div>
    </div>

    <div class="window-body">

      <div class="nav">
        <div class="nav-item active" onclick="switchPage('overview')" data-i18n="overview"></div>
        <div class="nav-item" onclick="switchPage('download')" data-i18n="download"></div>
        <div class="nav-item" onclick="switchPage('function')" data-i18n="functionTitle"></div>
        <div class="nav-item" onclick="switchPage('usage')" data-i18n="usageTitle"></div>
        <div class="nav-item" onclick="switchPage('info')" data-i18n="info"></div>
      </div>

      <div class="content">

        <div class="page active" id="overview">
          <h1>CaptureMemo</h1>
          <p data-i18n="desc"></p>
          <img class="shot" src="assets/CaptureMemo.png">
          <div class="box">
            <h3 data-i18n="envTitle"></h3>
            <p data-i18n="env"></p>
          </div>
           <div class="box">
            <h3 data-i18n="licenseTitle"></h3>
            <p data-i18n="license"></p>
          </div>
           <div class="box">
            <h3 data-i18n="DisclaimerTitle"></h3>
            <p data-i18n="Disclaimer"></p>
          </div>
           <div class="box">
            <h3 data-i18n="TermsOfUseTitle"></h3>
            <p data-i18n="TermsOfUse"></p>
          </div>
        </div>

        <div class="page" id="download">
          <h2 data-i18n="downloadTitle"></h2>

          <div class="box">
            <p data-i18n="downloadText"></p>

            <p>
              <a href="https://github.com/takuyash/CaptureMemo/releases" target="_blank">
                GitHub Releases（CaptureMemo）
              </a>
            </p>

            <p>
              <span data-i18n="githubProfile"></span>
              <a href="https://github.com/takuyash" target="_blank">
                GitHub Profile
              </a>
            </p>
          </div>
        </div>
        
        <div class="page" id="function">
          <h2 data-i18n="functionTitle"></h2>
          <div id="functionList"></div>
        </div>

        <div class="page" id="usage">
          <h2 data-i18n="usageTitle"></h2>
          <div id="usageList"></div>
        </div>

        <div class="page" id="info">
          <h2 data-i18n="informationTitle"></h2>

          <div id="infoList"></div>

</div>

      </div>

    </div>
  </div>

  <!-- CALCULATOR WINDOW -->
  <div class="window calculator-window" id="calcWindow" style="display:none;">

    <div class="titlebar" id="calcDragBar">
      <span data-i18n="calculator"></span>
      <div class="controls">
        <button onclick="closeCalculator()">×</button>
      </div>
    </div>

    <div class="calculator-body">
      <input type="text" class="calc-display" id="calcDisplay" readonly value="0">
      <div class="calc-buttons">
        <button class="calc-btn calc-btn-fn" onclick="calcClear()">C</button>
        <button class="calc-btn calc-btn-fn" onclick="calcBackspace()">⌫</button>
        <button class="calc-btn calc-btn-op" onclick="calcOperator('/')">÷</button>
        <button class="calc-btn calc-btn-op" onclick="calcOperator('*')">×</button>
        <button class="calc-btn" onclick="calcDigit('7')">7</button>
        <button class="calc-btn" onclick="calcDigit('8')">8</button>
        <button class="calc-btn" onclick="calcDigit('9')">9</button>
        <button class="calc-btn calc-btn-op" onclick="calcOperator('-')">−</button>
        <button class="calc-btn" onclick="calcDigit('4')">4</button>
        <button class="calc-btn" onclick="calcDigit('5')">5</button>
        <button class="calc-btn" onclick="calcDigit('6')">6</button>
        <button class="calc-btn calc-btn-op" onclick="calcOperator('+')">+</button>
        <button class="calc-btn" onclick="calcDigit('1')">1</button>
        <button class="calc-btn" onclick="calcDigit('2')">2</button>
        <button class="calc-btn" onclick="calcDigit('3')">3</button>
        <button class="calc-btn calc-btn-eq" onclick="calcEquals()">=</button>
        <button class="calc-btn calc-btn-zero" onclick="calcDigit('0')">0</button>
        <button class="calc-btn" onclick="calcDecimal()">.</button>
      </div>
    </div>

  </div>

  <!-- NOTEPAD WINDOW -->
  <div class="window notepad-window" id="notepadWindow" style="display:none;">

    <div class="titlebar" id="notepadDragBar">
      <span data-i18n="notepad"></span>
      <div class="controls">
        <button onclick="closeNotepad()">×</button>
      </div>
    </div>

    <div class="notepad-body">
      <textarea
        id="notepadText"
        class="notepad-textarea"
        spellcheck="false"
      ></textarea>
    </div>

  </div>

  <!-- PAINT WINDOW -->
  <div class="window paint-window" id="paintWindow" style="display:none;">

    <div class="titlebar" id="paintDragBar">
      <span data-i18n="paint"></span>
      <div class="controls">
        <button onclick="closePaint()">×</button>
      </div>
    </div>

    <div class="paint-body">
      <div class="paint-toolbar">
        <button type="button" class="paint-tool active" id="paintBrushBtn" onclick="setPaintTool('brush')" data-i18n="paintBrush"></button>
        <button type="button" class="paint-tool" id="paintEraserBtn" onclick="setPaintTool('eraser')" data-i18n="paintEraser"></button>
        <label class="paint-color-label">
          <input type="color" id="paintColor" value="#000000" onchange="setPaintColor(this.value)">
        </label>
        <label class="paint-size-label">
          <span data-i18n="paintSize"></span>
          <input type="range" id="paintSize" min="1" max="24" value="4" oninput="setPaintLineWidth(this.value)">
        </label>
        <button type="button" class="paint-clear-btn" onclick="clearPaintCanvas()" data-i18n="paintClear"></button>
      </div>
      <canvas id="paintCanvas" width="480" height="300"></canvas>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
