<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CaptureMemo</title>
  <link rel="stylesheet" href="styles.css">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-K2ZP2JRGN8"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-K2ZP2JRGN8');
</script>

</head>

<body>

<div class="desktop">

  <!-- DESKTOP ICONS -->
  <div class="desktop-icons">

    <div class="icon" ondblclick="openApp('overview')">
      📄
      <div data-i18n="overview"></div>
    </div>

    <div class="icon" ondblclick="openApp('download')">
      ⬇️
      <div data-i18n="download"></div>
    </div>

    <div class="icon" ondblclick="openApp('usage')">
      📘
      <div data-i18n="usageTitle"></div>
    </div>

    <div class="icon" ondblclick="openApp('info')">
      ℹ️
      <div data-i18n="info"></div>
    </div>

  </div>

  <!-- TASKBAR -->
  <div class="taskbar">
    <div class="start" onclick="toggleStart()">⊞</div>

    <div class="task-title" id="taskTitle"></div>

    <div class="lang" id="langBtn">EN</div>
    <div class="clock" id="clock"></div>
    <div class="calendar" id="calendar"></div>
  </div>

  <!-- START MENU -->
  <div class="start-menu" id="startMenu">
    <div onclick="openApp('overview')">CaptureMemo</div>
  </div>

  <!-- WINDOW -->
  <div class="window" id="appWindow">

    <div class="titlebar" id="dragBar">
      <span>CaptureMemo</span>
      <div class="controls">
        <button onclick="closeWindow()">×</button>
      </div>
    </div>

    <div class="window-body">

      <div class="nav">
        <div class="nav-item active" onclick="switchPage('overview')" data-i18n="overview"></div>
        <div class="nav-item" onclick="switchPage('download')" data-i18n="download"></div>
        <div class="nav-item" onclick="switchPage('function')" data-i18n="functionTitle"></div>
        <div class="nav-item" onclick="switchPage('usage')" data-i18n="usageTitle"></div>
        <div class="nav-item" onclick="switchPage('info')" data-i18n="info"></div>
      </div>

      <div class="content">

        <div class="page active" id="overview">
          <h1>CaptureMemo</h1>
          <p data-i18n="desc"></p>
          <img class="shot" src="assets/CaptureMemo.png">
          <div class="box">
            <h3 data-i18n="envTitle"></h3>
            <p data-i18n="env"></p>
          </div>
           <div class="box">
            <h3 data-i18n="licenseTitle"></h3>
            <p data-i18n="license"></p>
          </div>
           <div class="box">
            <h3 data-i18n="DisclaimerTitle"></h3>
            <p data-i18n="Disclaimer"></p>
          </div>
           <div class="box">
            <h3 data-i18n="TermsOfUseTitle"></h3>
            <p data-i18n="TermsOfUse"></p>
          </div>
        </div>

        <div class="page" id="download">
          <h2 data-i18n="downloadTitle"></h2>

          <div class="box">
            <p data-i18n="downloadText"></p>

            <p>
              <a href="https://github.com/takuyash/CaptureMemo/releases" target="_blank">
                GitHub Releases（CaptureMemo）
              </a>
            </p>

            <p>
              <span data-i18n="githubProfile"></span>
              <a href="https://github.com/takuyash" target="_blank">
                GitHub Profile
              </a>
            </p>
          </div>
        </div>
        
        <div class="page" id="function">
          <h2 data-i18n="functionTitle"></h2>
          <div id="functionList"></div>
        </div>

        <div class="page" id="usage">
          <h2 data-i18n="usageTitle"></h2>
          <div id="usageList"></div>
        </div>

        <div class="page" id="info">
          <h2 data-i18n="informationTitle"></h2>

          <div id="infoList"></div>

</div>

      </div>

    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
